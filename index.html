<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Blackboard</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css" />
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="./src/styles/main.css" />
</head>
<body>
<div class="frame" id="frame">
  <div class="screw tl"></div><div class="screw tr"></div><div class="screw bl"></div><div class="screw br"></div>

  <div class="top-bar">
    <span class="app-title">AI Blackboard</span>
    <input id="apikey" type="password" placeholder="OpenAI API key (sk-...)" autocomplete="off" />
    <button id="auto-talk-btn" type="button">🎧 Conversational mode: Off</button>
    <span id="voice-chip">Idle</span>
  </div>

  <div class="board" id="board">
    <div id="board-content">
      <div class="idle-title">What shall I write?</div>
      <div class="idle-hint">Talk naturally. I update the board when you pause.</div>
    </div>
  </div>

  <div class="chat-shell">
    <div id="chat-log" class="chat-log"></div>
    <div class="chat-composer">
      <input id="req" type="text" placeholder="Message Blackboard..." autocomplete="off" />
      <input id="image" type="file" accept="image/*" />
      <button id="go-btn">Send</button>
      <button id="erase-btn" title="Erase board">Erase board</button>
    </div>
    <div class="chat-meta">
      <span id="image-chip">No image selected</span>
      <span id="status-bar"></span>
      <label>W <input id="w-range" class="size-input" type="range" min="520" max="1200" step="10" /></label>
      <span id="w-val" class="size-val"></span>
      <label>H <input id="h-range" class="size-input" type="range" min="460" max="920" step="10" /></label>
      <span id="h-val" class="size-val"></span>
      <button id="size-reset" type="button">Reset size</button>
    </div>
  </div>

  <div class="resize-handle" id="resize-handle" title="Drag to resize board"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.js"></script>
<script type="module" src="./src/scripts/app.js"></script>
</body>
</html>
