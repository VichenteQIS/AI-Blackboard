<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blackboard</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css">
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

html,body{
  height:100%;
  background:#191209;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:24px;
  font-family:'Caveat',cursive;
}

/* ── Wooden frame ── */
.frame{
  width:100%;
  max-width:980px;
  background:#3b1f09;
  padding:22px 22px 14px;
  border-radius:4px;
  box-shadow:
    inset 0 1px 0 rgba(255,210,120,.15),
    inset 0 -1px 0 rgba(0,0,0,.5),
    0 20px 70px rgba(0,0,0,.85),
    0 2px 6px rgba(0,0,0,.6);
  position:relative;
}

/* grain */
.frame::before{
  content:'';position:absolute;inset:0;border-radius:4px;
  background:repeating-linear-gradient(88deg,transparent 0,rgba(0,0,0,.04) 1px,transparent 2px,transparent 10px);
  pointer-events:none;
}

/* corner screws */
.screw{
  position:absolute;width:10px;height:10px;border-radius:50%;
  background:radial-gradient(circle at 35% 35%,#a07040,#3a1e06);
  box-shadow:inset 0 1px 2px rgba(0,0,0,.6);
}
.screw.tl{top:8px;left:8px}
.screw.tr{top:8px;right:8px}
.screw.bl{bottom:26px;left:8px}
.screw.br{bottom:26px;right:8px}

/* ── Board surface ── */
.board{
  background:#243d2f;
  min-height:300px;
  position:relative;
  overflow:hidden;
  border:1.5px solid rgba(0,0,0,.5);
  box-shadow:inset 0 0 80px rgba(0,0,0,.25);
}

/* faint ruled lines */
.board::before{
  content:'';position:absolute;inset:0;z-index:0;pointer-events:none;
  background-image:linear-gradient(rgba(255,255,255,.012) 1px,transparent 1px);
  background-size:100% 48px;
}

/* chalk dust smudges */
.board::after{
  content:'';position:absolute;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse 60% 30% at 15% 20%,rgba(255,255,255,.018) 0%,transparent 100%),
    radial-gradient(ellipse 40% 20% at 85% 75%,rgba(255,255,255,.012) 0%,transparent 100%),
    radial-gradient(ellipse 30% 15% at 50% 50%,rgba(255,255,255,.008) 0%,transparent 100%);
}

/* ── Content area ── */
#board-content{
  position:relative;z-index:1;
  padding:32px 40px 28px;
  min-height:300px;
  display:flex;
  flex-direction:column;
  align-items:stretch;
  justify-content:center;
  gap:0;
}

/* ── Title ── */
.eq-title{
  font-size:26px;
  font-weight:700;
  color:rgba(255,252,228,.8);
  text-align:center;
  letter-spacing:.04em;
  margin-bottom:20px;
  text-shadow:0 0 20px rgba(255,252,200,.15);
  animation:chalkIn .5s ease both;
}

/* ── Equations row (horizontal) ── */
.eq-row{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  flex:1;
  padding:0 20px;
  animation:chalkIn .5s ease both;
}

.eq-label{
  font-size:14px;
  color:rgba(220,240,200,.45);
  text-align:center;
  margin-bottom:6px;
}

.eq-math{
  color:rgba(255,252,228,.88);
  text-shadow:0 0 14px rgba(255,252,200,.12);
  text-align:center;
}
.eq-math.sz-large  { font-size:2rem }
.eq-math.sz-medium { font-size:1.4rem; color:rgba(255,252,228,.78) }
.eq-math.sz-small  { font-size:1rem;   color:rgba(255,252,228,.65) }

/* force KaTeX to inherit chalk color */
.eq-math .katex,
.eq-math .katex *{ color:inherit!important }

/* ── Equations strip (horizontal flex container) ── */
.eq-strip{
  display:flex;
  flex-direction:row;
  align-items:center;
  justify-content:center;
  width:100%;
  gap:0;
}

/* ── Vertical divider between equations ── */
.eq-divider{
  width:1px;
  height:100px;
  background:rgba(255,252,200,.12);
  flex-shrink:0;
  align-self:center;
  animation:chalkIn .5s ease both;
}

/* ── Notes ── */
.notes-area{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  justify-content:center;
  margin-top:20px;
}
.note{
  font-size:16px;
  color:rgba(190,230,195,.7);
  border-left:2px solid rgba(190,230,195,.25);
  padding:2px 10px;
  animation:chalkIn .5s ease both;
}

/* ── Loading dots ── */
.loading{
  display:flex;gap:10px;align-items:center;justify-content:center;
  height:80px;
}
.loading span{
  width:9px;height:9px;border-radius:50%;
  background:rgba(255,252,220,.4);
  animation:dot 1.2s ease-in-out infinite both;
}
.loading span:nth-child(2){animation-delay:.2s}
.loading span:nth-child(3){animation-delay:.4s}
@keyframes dot{
  0%,100%{transform:scale(.55);opacity:.3}
  50%{transform:scale(1);opacity:.9}
}

/* ── Error ── */
.board-error{
  font-size:22px;
  color:rgba(255,130,130,.8);
  text-align:center;
}

/* ── Idle hint ── */
.idle-title{
  font-size:30px;font-weight:400;
  color:rgba(255,252,228,.35);
  text-align:center;margin-bottom:12px;
  animation:chalkIn .6s ease both;
}
.idle-hint{
  font-size:16px;
  color:rgba(255,252,228,.22);
  text-align:center;
  animation:chalkIn .6s .1s ease both;
}

/* ── Chalk-in animation ── */
@keyframes chalkIn{
  from{opacity:0;transform:translateY(-10px) scale(.98);filter:blur(4px)}
  to  {opacity:1;transform:translateY(0)      scale(1);  filter:blur(0)}
}

/* ── Chalk tray ── */
.tray{
  display:flex;gap:10px;align-items:center;
  background:linear-gradient(180deg,#2a1206 0%,#1c0d04 100%);
  margin-top:10px;
  padding:12px 18px;
  border-top:2px solid rgba(0,0,0,.5);
}

.tray input{
  flex:1;background:transparent;border:none;
  border-bottom:1.5px solid rgba(255,252,200,.2);
  color:rgba(255,252,228,.9);
  font-family:'Caveat',cursive;font-size:20px;
  padding:6px 4px;outline:none;
  transition:border-color .2s;
}
.tray input:focus{border-bottom-color:rgba(255,252,200,.5)}
.tray input::placeholder{color:rgba(255,252,228,.25)}

.tray button{
  background:rgba(255,252,200,.08);
  border:1px solid rgba(255,252,200,.18);
  color:rgba(255,252,228,.8);
  font-family:'Caveat',cursive;font-size:17px;
  padding:8px 20px;border-radius:3px;cursor:pointer;
  transition:background .15s,color .15s;
  white-space:nowrap;
}
.tray button:hover:not(:disabled){background:rgba(255,252,200,.18);color:#fff}
.tray button:disabled{opacity:.4;cursor:not-allowed}

/* eraser button */
.btn-erase{
  background:none;border:none;
  color:rgba(255,252,228,.3);
  font-family:'Caveat',cursive;font-size:15px;
  cursor:pointer;padding:8px 10px;
  transition:color .15s;
}
.btn-erase:hover{color:rgba(255,252,228,.6)}
</style>
</head>
<body>

<div class="frame">
  <div class="screw tl"></div>
  <div class="screw tr"></div>
  <div class="screw bl"></div>
  <div class="screw br"></div>

  <div class="board">
    <div id="board-content">
      <div class="idle-title">What shall I write?</div>
      <div class="idle-hint">Euler's identity · Maxwell's equations · Schrödinger · Fourier transform · anything</div>
    </div>
  </div>

  <div class="tray">
    <input id="apikey" type="password" placeholder="sk-… OpenAI key" autocomplete="off" style="max-width:190px;flex:0 0 190px;font-size:15px;" />
    <span style="color:rgba(255,252,228,.18);font-size:20px;flex-shrink:0;padding:0 4px">|</span>
    <input id="req" type="text" placeholder="Ask for any equation or concept…" autocomplete="off" />
    <button id="go-btn">✎ Write</button>
    <button class="btn-erase" id="erase-btn" title="Erase board">⌫ Erase</button>
  </div>
  <div id="status-bar" style="
    font-family:'Caveat',cursive;font-size:14px;
    padding:6px 18px;min-height:26px;
    color:rgba(255,160,160,.85);
    background:#100804;
    border-top:1px solid rgba(0,0,0,.4);
    display:none;
  "></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.js"></script>
<script>
const SYSTEM = `You are a mathematical blackboard. Given a topic or equation request, respond ONLY with a single JSON object — no markdown fences, no extra text — in this exact schema:

{
  "title": "Concept name (max 5 words)",
  "equations": [
    { "label": "optional tag", "latex": "raw KaTeX LaTeX expression", "size": "large|medium|small" }
  ],
  "notes": ["short chalk annotation (max 8 words)", "..."]
}

Rules:
- "latex" must be valid KaTeX. Do NOT wrap in $, $$, \\( \\), or \\[ \\].
- Use "large" for the hero equation, "medium" for supporting equations, "small" for definitions/substitutions.
- 1–4 equations, 1–3 notes.
- Notes are terse and insightful — like what a professor writes in the margin.
- Respond ONLY with the JSON.`;

async function fetchBoard(query) {
  const key = document.getElementById('apikey').value.trim();
  if (!key) throw new Error('Paste your OpenAI API key in the field on the left.');
  const res = await fetch('https://api.openai.com/v1/chat/completions', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': 'Bearer ' + key,
    },
    body: JSON.stringify({
      model: 'gpt-4o-mini',
      max_tokens: 1000,
      messages: [
        { role: 'system', content: SYSTEM },
        { role: 'user',   content: query },
      ],
    }),
  });
  if (!res.ok) {
    const e = await res.json().catch(() => ({}));
    throw new Error(e.error?.message || res.statusText);
  }
  const data = await res.json();
  const raw = (data.choices?.[0]?.message?.content || '').replace(/```json|```/g,'').trim();
  try {
    return JSON.parse(raw);
  } catch(e) {
    throw new Error('Bad JSON from model: ' + raw.slice(0, 120));
  }
}

function renderLatex(latex) {
  try {
    return katex.renderToString(latex, { displayMode: true, throwOnError: false, strict: false });
  } catch {
    return `<span style="color:rgba(255,150,150,.8);font-size:14px">${latex}</span>`;
  }
}

function paint(data) {
  const el = document.getElementById('board-content');
  el.innerHTML = '';

  const t = document.createElement('div');
  t.className = 'eq-title';
  t.textContent = data.title || '';
  el.appendChild(t);

  const strip = document.createElement('div');
  strip.className = 'eq-strip';

  (data.equations || []).forEach((eq, i) => {
    if (i > 0) {
      const div = document.createElement('div');
      div.className = 'eq-divider';
      div.style.animationDelay = `${100 + i * 140}ms`;
      strip.appendChild(div);
    }

    const col = document.createElement('div');
    col.className = 'eq-row';
    col.style.animationDelay = `${60 + i * 140}ms`;

    if (eq.label) {
      const lbl = document.createElement('div');
      lbl.className = 'eq-label';
      lbl.textContent = eq.label;
      col.appendChild(lbl);
    }

    const math = document.createElement('div');
    math.className = `eq-math sz-${eq.size || 'large'}`;
    math.innerHTML = renderLatex(eq.latex || '');
    col.appendChild(math);
    strip.appendChild(col);
  });

  el.appendChild(strip);

  if (data.notes && data.notes.length) {
    const na = document.createElement('div');
    na.className = 'notes-area';
    const baseDelay = 100 + (data.equations?.length || 0) * 140;
    data.notes.forEach((n, i) => {
      const note = document.createElement('div');
      note.className = 'note';
      note.textContent = n;
      note.style.animationDelay = `${baseDelay + i * 90}ms`;
      na.appendChild(note);
    });
    el.appendChild(na);
  }
}

function showLoading() {
  document.getElementById('board-content').innerHTML =
    '<div class="loading"><span></span><span></span><span></span></div>';
}

function showIdle() {
  document.getElementById('board-content').innerHTML =
    `<div class="idle-title">What shall I write?</div>
     <div class="idle-hint">Euler's identity · Maxwell's equations · Schrödinger · Fourier transform · anything</div>`;
}

function setStatus(msg) {
  const bar = document.getElementById('status-bar');
  if (msg) { bar.textContent = '⚠ ' + msg; bar.style.display = 'block'; }
  else      { bar.textContent = '';          bar.style.display = 'none'; }
}

async function go() {
  const input = document.getElementById('req');
  const btn   = document.getElementById('go-btn');
  const query = input.value.trim();
  if (!query) { input.focus(); return; }

  setStatus('');
  btn.disabled = true;
  btn.textContent = '…writing';
  showLoading();

  try {
    const data = await fetchBoard(query);
    paint(data);
    input.value = '';
  } catch (err) {
    showIdle();
    setStatus(err.message || 'Something went wrong.');
    console.error(err);
  } finally {
    btn.disabled = false;
    btn.textContent = '✎ Write';
    input.focus();
  }
}

document.getElementById('go-btn').addEventListener('click', go);
document.getElementById('erase-btn').addEventListener('click', showIdle);
document.getElementById('req').addEventListener('keydown', e => {
  if (e.key === 'Enter') go();
});
</script>
</body>
</html>
