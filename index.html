<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Blackboard</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css" />
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&display=swap" rel="stylesheet" />
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  background: #191209;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 16px;
  font-family: 'Caveat', cursive;
}

.frame {
  width: min(96vw, 980px);
  height: min(90vh, 680px);
  min-width: 520px;
  min-height: 460px;
  max-width: 1200px;
  max-height: 92vh;
  background: #3b1f09;
  border-radius: 4px;
  box-shadow:
    inset 0 1px 0 rgba(255,210,120,.15),
    inset 0 -1px 0 rgba(0,0,0,.5),
    0 20px 70px rgba(0,0,0,.85),
    0 2px 6px rgba(0,0,0,.6);
  position: relative;
  padding: 18px 18px 12px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.frame::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 4px;
  background: repeating-linear-gradient(88deg, transparent 0, rgba(0,0,0,.04) 1px, transparent 2px, transparent 10px);
  pointer-events: none;
}

.screw {
  position: absolute;
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: radial-gradient(circle at 35% 35%, #a07040, #3a1e06);
  box-shadow: inset 0 1px 2px rgba(0,0,0,.6);
}
.screw.tl { top: 8px; left: 8px; }
.screw.tr { top: 8px; right: 8px; }
.screw.bl { bottom: 8px; left: 8px; }
.screw.br { bottom: 8px; right: 8px; }

.board {
  flex: 1;
  background: #243d2f;
  position: relative;
  overflow: hidden;
  border: 1.5px solid rgba(0,0,0,.5);
  box-shadow: inset 0 0 80px rgba(0,0,0,.25);
  min-height: 220px;
}

.board::before {
  content: '';
  position: absolute;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  background-image: linear-gradient(rgba(255,255,255,.012) 1px, transparent 1px);
  background-size: 100% 46px;
}

.board::after {
  content: '';
  position: absolute;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  background:
    radial-gradient(ellipse 60% 30% at 15% 20%, rgba(255,255,255,.018) 0%, transparent 100%),
    radial-gradient(ellipse 40% 20% at 85% 75%, rgba(255,255,255,.012) 0%, transparent 100%),
    radial-gradient(ellipse 30% 15% at 50% 50%, rgba(255,255,255,.008) 0%, transparent 100%);
}

#board-content {
  position: relative;
  z-index: 1;
  width: 100%;
  height: 100%;
  padding: 28px 32px;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.eq-title { font-size: 28px; font-weight: 700; color: rgba(255,252,228,.85); text-align: center; margin-bottom: 16px; }
.eq-strip { display: flex; align-items: center; justify-content: center; width: 100%; }
.eq-row { flex: 1; padding: 0 16px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.eq-label { font-size: 14px; color: rgba(220,240,200,.45); margin-bottom: 6px; }
.eq-math { color: rgba(255,252,228,.88); text-align: center; }
.eq-math.sz-large { font-size: 2rem; }
.eq-math.sz-medium { font-size: 1.35rem; color: rgba(255,252,228,.78); }
.eq-math.sz-small { font-size: 1rem; color: rgba(255,252,228,.65); }
.eq-math .katex, .eq-math .katex * { color: inherit !important; }
.eq-divider { width: 1px; height: 90px; background: rgba(255,252,200,.12); }

.notes-area { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 14px; }
.note { font-size: 16px; color: rgba(190,230,195,.72); border-left: 2px solid rgba(190,230,195,.25); padding: 2px 10px; }

.idle-title { font-size: 32px; color: rgba(255,252,228,.38); text-align: center; margin-bottom: 10px; }
.idle-hint { font-size: 17px; color: rgba(255,252,228,.26); text-align: center; }

.loading { display: flex; gap: 10px; align-items: center; justify-content: center; height: 100%; }
.loading span { width: 9px; height: 9px; border-radius: 50%; background: rgba(255,252,220,.4); animation: dot 1.2s ease-in-out infinite both; }
.loading span:nth-child(2){animation-delay:.2s}
.loading span:nth-child(3){animation-delay:.4s}
@keyframes dot { 0%,100% { transform: scale(.55); opacity: .3; } 50% { transform: scale(1); opacity:.9; } }

.controls {
  background: linear-gradient(180deg, #2a1206 0%, #1c0d04 100%);
  border-top: 2px solid rgba(0,0,0,.5);
  padding: 10px 12px;
  display: grid;
  gap: 8px;
}
.control-row {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  align-items: center;
}
.control-label {
  color: rgba(255,252,228,.55);
  font-size: 16px;
  min-width: 54px;
}

input[type="text"], input[type="password"], input[type="file"] {
  background: rgba(0,0,0,.1);
  border: 1px solid rgba(255,252,200,.2);
  color: rgba(255,252,228,.9);
  font-family: 'Caveat', cursive;
  border-radius: 3px;
  padding: 6px 8px;
}
input[type="text"] { flex: 1; min-width: 240px; font-size: 20px; }
input[type="password"] { width: 240px; font-size: 16px; }
input[type="file"] { max-width: 320px; font-size: 14px; }

button {
  background: rgba(255,252,200,.08);
  border: 1px solid rgba(255,252,200,.18);
  color: rgba(255,252,228,.84);
  font-family: 'Caveat', cursive;
  font-size: 17px;
  border-radius: 3px;
  padding: 8px 12px;
  cursor: pointer;
}
button:hover:not(:disabled) { background: rgba(255,252,200,.18); color: #fff; }
button:disabled { opacity: .4; cursor: not-allowed; }

#status-bar {
  color: rgba(255,160,160,.88);
  font-size: 15px;
  min-height: 18px;
}

.resize-handle {
  position: absolute;
  right: 3px;
  bottom: 3px;
  width: 22px;
  height: 22px;
  cursor: nwse-resize;
  border-radius: 2px;
  background:
    linear-gradient(135deg, transparent 0 45%, rgba(255,252,228,.25) 46% 52%, transparent 53% 100%),
    linear-gradient(135deg, transparent 0 62%, rgba(255,252,228,.25) 63% 69%, transparent 70% 100%),
    linear-gradient(135deg, transparent 0 78%, rgba(255,252,228,.25) 79% 85%, transparent 86% 100%);
}

@media (max-width: 720px) {
  .frame { min-width: 100%; height: 94vh; }
  input[type="password"], input[type="text"], input[type="file"] { width: 100%; min-width: 0; }
}
</style>
</head>
<body>
<div class="frame" id="frame">
  <div class="screw tl"></div><div class="screw tr"></div><div class="screw bl"></div><div class="screw br"></div>

  <div class="board">
    <div id="board-content">
      <div class="idle-title">What shall I write?</div>
      <div class="idle-hint">Use text, voice, or image. Say "erase" to clear the board.</div>
    </div>
  </div>

  <div class="controls">
    <div class="control-row">
      <span class="control-label">API Key</span>
      <input id="apikey" type="password" placeholder="sk-..." autocomplete="off" />
    </div>

    <div class="control-row">
      <span class="control-label">Prompt</span>
      <input id="req" type="text" placeholder="Type a concept, equation, or 'erase'" autocomplete="off" />
      <button id="go-btn">✎ Write</button>
      <button id="erase-btn" title="Erase board">⌫ Erase</button>
    </div>

    <div class="control-row">
      <span class="control-label">Voice</span>
      <button id="mic-btn" title="Record audio">🎙 Record</button>
      <span style="color:rgba(205,235,200,.75);font-size:15px" id="voice-chip">No audio captured</span>
    </div>

    <div class="control-row">
      <span class="control-label">Image</span>
      <input id="image" type="file" accept="image/*" />
      <span style="color:rgba(205,235,200,.75);font-size:15px" id="image-chip">No image selected</span>
    </div>

    <div id="status-bar"></div>
  </div>

  <div class="resize-handle" id="resize-handle" title="Drag to resize board"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.js"></script>
<script>
const SYSTEM = `You are a mathematical blackboard controller.
Respond ONLY with one JSON object in this exact schema:
{
  "action": "write|erase",
  "title": "Concept name (max 5 words)",
  "equations": [
    { "label": "optional tag", "latex": "raw KaTeX expression", "size": "large|medium|small" }
  ],
  "notes": ["short chalk annotation", "..."]
}
Rules:
- If user intent is erase/wipe/clear board, return action="erase" and empty title/equations/notes.
- Otherwise return action="write" with 1-4 equations and 1-3 notes.
- latex must be valid KaTeX and must not use $ wrappers.
- No markdown fences. JSON only.`;

let mediaRecorder = null;
let recordedChunks = [];
let recordedAudioBlob = null;

function setStatus(msg) {
  const el = document.getElementById('status-bar');
  el.textContent = msg ? `⚠ ${msg}` : '';
}

function showLoading() {
  document.getElementById('board-content').innerHTML = '<div class="loading"><span></span><span></span><span></span></div>';
}

function showIdle() {
  document.getElementById('board-content').innerHTML =
    '<div class="idle-title">What shall I write?</div><div class="idle-hint">Use text, voice, or image. Say "erase" to clear the board.</div>';
}

function renderLatex(latex) {
  try {
    return katex.renderToString(latex, { displayMode: true, throwOnError: false, strict: false });
  } catch {
    return `<span style="color:rgba(255,150,150,.8);font-size:14px">${latex}</span>`;
  }
}

function paint(data) {
  if (data.action === 'erase') {
    showIdle();
    return;
  }

  const el = document.getElementById('board-content');
  el.innerHTML = '';

  const t = document.createElement('div');
  t.className = 'eq-title';
  t.textContent = data.title || '';
  el.appendChild(t);

  const strip = document.createElement('div');
  strip.className = 'eq-strip';

  (data.equations || []).forEach((eq, i) => {
    if (i > 0) {
      const divider = document.createElement('div');
      divider.className = 'eq-divider';
      strip.appendChild(divider);
    }

    const col = document.createElement('div');
    col.className = 'eq-row';

    if (eq.label) {
      const lbl = document.createElement('div');
      lbl.className = 'eq-label';
      lbl.textContent = eq.label;
      col.appendChild(lbl);
    }

    const math = document.createElement('div');
    math.className = `eq-math sz-${eq.size || 'large'}`;
    math.innerHTML = renderLatex(eq.latex || '');
    col.appendChild(math);
    strip.appendChild(col);
  });

  el.appendChild(strip);

  if (data.notes?.length) {
    const notes = document.createElement('div');
    notes.className = 'notes-area';
    data.notes.forEach(n => {
      const note = document.createElement('div');
      note.className = 'note';
      note.textContent = n;
      notes.appendChild(note);
    });
    el.appendChild(notes);
  }
}

function safeParseModelJSON(raw) {
  const cleaned = raw.replace(/```json|```/g, '').trim();
  const firstBrace = cleaned.indexOf('{');
  const lastBrace = cleaned.lastIndexOf('}');
  const jsonSlice = firstBrace >= 0 && lastBrace > firstBrace
    ? cleaned.slice(firstBrace, lastBrace + 1)
    : cleaned;
  return JSON.parse(jsonSlice);
}

async function transcribeAudio(blob, key) {
  const form = new FormData();
  form.append('file', blob, 'prompt.webm');
  form.append('model', 'whisper-1');

  const res = await fetch('https://api.openai.com/v1/audio/transcriptions', {
    method: 'POST',
    headers: { Authorization: 'Bearer ' + key },
    body: form,
  });

  if (!res.ok) {
    const e = await res.json().catch(() => ({}));
    throw new Error(e.error?.message || 'Audio transcription failed.');
  }

  const data = await res.json();
  return (data.text || '').trim();
}

async function readImageAsDataURL(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = () => reject(new Error('Could not read image file.'));
    reader.readAsDataURL(file);
  });
}

async function fetchBoard({ query, imageDataURL, key }) {
  const userParts = [];
  if (query) userParts.push({ type: 'text', text: query });
  if (imageDataURL) userParts.push({ type: 'image_url', image_url: { url: imageDataURL } });

  const res = await fetch('https://api.openai.com/v1/chat/completions', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      Authorization: 'Bearer ' + key,
    },
    body: JSON.stringify({
      model: 'gpt-4o-mini',
      temperature: 0.2,
      max_tokens: 1000,
      messages: [
        { role: 'system', content: SYSTEM },
        { role: 'user', content: userParts.length ? userParts : [{ type: 'text', text: 'erase' }] },
      ],
    }),
  });

  if (!res.ok) {
    const e = await res.json().catch(() => ({}));
    throw new Error(e.error?.message || res.statusText);
  }

  const payload = await res.json();
  const raw = payload.choices?.[0]?.message?.content || '{}';
  const parsed = safeParseModelJSON(raw);
  if (!parsed.action) parsed.action = 'write';
  return parsed;
}

async function go() {
  const key = document.getElementById('apikey').value.trim();
  const input = document.getElementById('req');
  const imageInput = document.getElementById('image');
  const query = input.value.trim();
  const goBtn = document.getElementById('go-btn');

  if (!key) {
    setStatus('Paste your OpenAI API key first.');
    return;
  }

  let transcript = '';
  let imageDataURL = null;
  const imageFile = imageInput.files?.[0];

  goBtn.disabled = true;
  showLoading();
  setStatus('');

  try {
    if (recordedAudioBlob) {
      transcript = await transcribeAudio(recordedAudioBlob, key);
    }

    if (imageFile) {
      imageDataURL = await readImageAsDataURL(imageFile);
    }

    const mergedQuery = [query, transcript].filter(Boolean).join('\n');
    if (!mergedQuery && !imageDataURL) {
      showIdle();
      setStatus('Provide at least one input: text, voice, or image.');
      return;
    }

    const boardData = await fetchBoard({ query: mergedQuery, imageDataURL, key });
    paint(boardData);

    recordedAudioBlob = null;
    document.getElementById('voice-chip').textContent = 'No audio captured';
    imageInput.value = '';
    document.getElementById('image-chip').textContent = 'No image selected';
    input.value = '';
  } catch (err) {
    showIdle();
    setStatus(err.message || 'Something went wrong.');
    console.error(err);
  } finally {
    goBtn.disabled = false;
    input.focus();
  }
}

async function toggleRecording() {
  const micBtn = document.getElementById('mic-btn');

  if (mediaRecorder && mediaRecorder.state === 'recording') {
    mediaRecorder.stop();
    micBtn.textContent = '🎙 Record';
    return;
  }

  if (!navigator.mediaDevices?.getUserMedia) {
    setStatus('Microphone recording is not supported in this browser.');
    return;
  }

  const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
  recordedChunks = [];
  mediaRecorder = new MediaRecorder(stream);

  mediaRecorder.ondataavailable = evt => {
    if (evt.data.size > 0) recordedChunks.push(evt.data);
  };

  mediaRecorder.onstop = () => {
    recordedAudioBlob = new Blob(recordedChunks, { type: 'audio/webm' });
    document.getElementById('voice-chip').textContent = 'Audio captured ✓';
    setStatus('Audio captured. Click ✎ Write.');
    stream.getTracks().forEach(track => track.stop());
  };

  mediaRecorder.start();
  micBtn.textContent = '■ Stop';
  setStatus('Recording… click ■ Stop when done.');
}

function setupResizer() {
  const frame = document.getElementById('frame');
  const handle = document.getElementById('resize-handle');
  let startX = 0;
  let startY = 0;
  let startW = 0;
  let startH = 0;

  handle.addEventListener('pointerdown', e => {
    e.preventDefault();
    startX = e.clientX;
    startY = e.clientY;
    const rect = frame.getBoundingClientRect();
    startW = rect.width;
    startH = rect.height;

    const onMove = evt => {
      const nextW = Math.max(520, Math.min(window.innerWidth - 20, startW + (evt.clientX - startX)));
      const nextH = Math.max(460, Math.min(window.innerHeight - 20, startH + (evt.clientY - startY)));
      frame.style.width = `${nextW}px`;
      frame.style.height = `${nextH}px`;
    };

    const onUp = () => {
      window.removeEventListener('pointermove', onMove);
      window.removeEventListener('pointerup', onUp);
    };

    window.addEventListener('pointermove', onMove);
    window.addEventListener('pointerup', onUp);
  });
}

document.getElementById('go-btn').addEventListener('click', go);
document.getElementById('erase-btn').addEventListener('click', () => {
  recordedAudioBlob = null;
  document.getElementById('voice-chip').textContent = 'No audio captured';
  document.getElementById('image').value = '';
  document.getElementById('image-chip').textContent = 'No image selected';
  document.getElementById('req').value = '';
  showIdle();
  setStatus('');
});
document.getElementById('mic-btn').addEventListener('click', () => toggleRecording().catch(err => setStatus(err.message || 'Microphone error.')));
document.getElementById('image').addEventListener('change', e => {
  const name = e.target.files?.[0]?.name;
  document.getElementById('image-chip').textContent = name ? `Selected: ${name}` : 'No image selected';
});
document.getElementById('req').addEventListener('keydown', e => { if (e.key === 'Enter') go(); });

setupResizer();
</script>
</body>
</html>
